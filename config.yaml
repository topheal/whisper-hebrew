# הגדרות מערכת התמלול האוטומטית
# סדר התיקיות ברשימה = סדר עדיפות (התיקייה הראשונה מתומללת ראשונה)

folders:
  # TODO: עדכן כאן את התיקיות שאתה רוצה לסרוק (סדר = עדיפות)
  # אפשר להעתיק נתיב ישירות ממנהל הקבצים של Windows - השתמש בגרשיים יחידים '...'
  #
  # recursive: true (ברירת מחדל, אין צורך לכתוב) = סורק גם תתי-תיקיות
  # summarize: false (או לא לכתוב כלל)            = ברירת המחדל - רק SRT, מנוע מקומי, בלי Claude Code
  # summarize: true                               = בנוסף ל-SRT, גם _summary.txt דרך claude -p
  # maxdays: N                                    = לתמלל רק קבצים שהשתנו/נוצרו בN הימים האחרונים (לא לכתוב = בלי הגבלה)
  # קבצים שבשמם מופיעה "raw" (בכל צורת אותיות) מדולגים תמיד - נחשבים גרסת גלם
  #
  # - path: 'G:\האחסון שלי\תיקייה לדוגמה'
  #   maxdays: 30
  #
  # - path: 'C:\Users\admin\Downloads\שיחות חשובות'
  #   recursive: false
  #   summarize: true
  - path: 'G:\תיקיות אחסון שיתופי\תכניות\תכנית פותחים פה לבריאות w1w\ה. מפגשי תמיכה'
    recursive: true
    maxdays: 90

# כל כמה דקות לסרוק את התיקיות ברקע (60 = שעה)
scan_interval_minutes: 60

# כמה קבצים לתמלל במקביל (כל קובץ במקביל טוען מודל בנפרד -> צריך יותר RAM)
max_parallel: 1

# גודל מודל Whisper: tiny, base, small, medium, large-v3
model_size: medium

# פורמטים נתמכים (לא צריך לשנות בד"כ)
extensions:
  - mp3
  - mp4
  - wav
  - m4a
  - ogg
  - flac
  - webm
  - mkv
  - aac
  - wma
